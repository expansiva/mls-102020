<!-- Inline calendar (always visible) with special dates (info + blocked) -->
<molecules--group-enter-datetime--inline-calendar-102020
  value="2026-04-14"
  min="2026-04-01"
  max="2026-04-30"
  visible-month="2026-04"
  locale="pt-BR"
  firstDayOfWeek="1"
  show-adjacent-days
>
  <Label>Agenda</Label>
  <Helper>Selecione uma data disponível. Datas em vermelho estão bloqueadas.</Helper>
  <Error>Seleção inválida.</Error>
</molecules--group-enter-datetime--inline-calendar-102020>

<!-- Example: readonly, but navigation allowed -->
<molecules--group-enter-datetime--inline-calendar-102020
  value="2026-04-14"
  readonly
  allow-navigation-when-readonly
  visible-month="2026-04"
  locale="en-US"
  firstDayOfWeek="0"
>
  <Label>Read-only calendar</Label>
  <Helper>You can browse months, but cannot change the selected date.</Helper>
</molecules--group-enter-datetime--inline-calendar-102020>
